<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Timer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game">

        <h1>⚡ Reaction Time</h1>

        <p id="message">
            Test your reflexes!<br>
            Wait for the color change,<br>
            then click as fast as you can.
        </p>


        <div id="gameBox">
            START GAME
        </div>


        <div class="stats">

            <p>
                🏆 Best:
                <span id="best">--</span> ms
            </p>

            <p>
                📈 Average:
                <span id="average">--</span> ms
            </p>

            <p>
                🎯 Attempts:
                <span id="attempts">0</span>
            </p>

        </div>

    </div>


<script src="script.js"></script>

</body>

</html>
